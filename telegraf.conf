# telegraf.conf — Template pour les VMs PQC Bench
# Copier sur chaque VM dans /etc/telegraf/telegraf.conf
# Remplacer INFLUX_URL et INFLUX_TOKEN par les valeurs réelles.
#
# Installation : sudo apt install telegraf
# Démarrage   : sudo systemctl enable --now telegraf

[agent]
  interval          = "5s"
  round_interval    = true
  metric_batch_size = 1000
  flush_interval    = "10s"
  hostname          = ""   # vide = détection automatique via os.Hostname()

# ── Sortie : InfluxDB v2 ──────────────────────────────────────────────────────
[[outputs.influxdb_v2]]
  urls         = ["http://INFLUX_URL:8086"]
  token        = "INFLUX_TOKEN"
  organization = "pqc"
  bucket       = "pqc_bench"

# ── CPU ───────────────────────────────────────────────────────────────────────
[[inputs.cpu]]
  percpu          = false
  totalcpu        = true
  collect_cpu_time= false
  report_active   = false

# ── RAM ───────────────────────────────────────────────────────────────────────
[[inputs.mem]]

# ── Réseau ───────────────────────────────────────────────────────────────────
[[inputs.net]]
  # Limite aux interfaces de test et contrôle
  # interfaces = ["eth1", "eth2"]   # décommenter et adapter si nécessaire

# ── Charge système ────────────────────────────────────────────────────────────
[[inputs.system]]

# ── Disque (optionnel) ────────────────────────────────────────────────────────
[[inputs.disk]]
  ignore_fs = ["tmpfs", "devtmpfs", "devfs", "iso9660", "overlay", "aufs", "squashfs"]
