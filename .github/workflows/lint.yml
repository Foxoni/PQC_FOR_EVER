name: Lint & Syntax

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  # ─── Verification syntaxe Bash ─────────────────────────────────────────────
  bash-syntax:
    name: Bash syntax (bash -n)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check syntax
        run: bash -n pqc_bench.sh

  # ─── ShellCheck (analyse statique Bash) ────────────────────────────────────
  # continue-on-error car certains patterns complexes (heredocs Python,
  # tableaux associatifs) peuvent generer des avertissements non bloquants.
  shellcheck:
    name: ShellCheck (severite error)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
      - name: Run shellcheck
        run: shellcheck --severity=error --shell=bash pqc_bench.sh
        continue-on-error: true

  # ─── Verification syntaxe Python ───────────────────────────────────────────
  python-syntax:
    name: Python syntax (py_compile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Compile check
        run: |
          python3 -m py_compile traffic_gen.py
          python3 -m py_compile traffic_presets.py
          python3 -m py_compile vm_agent.py
          python3 -m py_compile server_cli.py
          echo "Syntax OK"

  # ─── Verification imports Python ───────────────────────────────────────────
  # Verifie que les imports standards sont disponibles sans executer le code.
  python-imports:
    name: Python imports check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install psutil
      - name: Check imports
        run: |
          python3 -c "import traffic_gen"
          python3 -c "import traffic_presets"
          python3 -c "import vm_agent"
          python3 -c "import server_cli"
          echo "Imports OK"

  # ─── Validation docker-compose.yml ─────────────────────────────────────────
  # docker compose config valide la syntaxe YAML + la semantique Compose.
  # Les variables du .env sont substituees par des valeurs factices pour CI.
  docker-compose-lint:
    name: docker-compose.yml syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate docker-compose.yml
        env:
          INFLUX_ADMIN_USER:     ci_user
          INFLUX_ADMIN_PASSWORD: ci_password
          INFLUX_ORG:            pqc
          INFLUX_BUCKET:         pqc_bench
          INFLUX_TOKEN:          ci_token_placeholder
          GRAFANA_ADMIN_USER:    ci_admin
          GRAFANA_ADMIN_PASSWORD: ci_grafana
        run: docker compose config --quiet

  # ─── Validation fichiers de configuration Grafana ──────────────────────────
  grafana-config:
    name: Grafana config (JSON + YAML)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate dashboard JSON
        run: |
          for f in grafana/provisioning/dashboards/*.json; do
            python3 -m json.tool "$f" > /dev/null && echo "OK: $f"
          done
      - name: Validate provisioning YAML
        run: |
          pip install pyyaml --quiet
          for f in grafana/provisioning/**/*.yml; do
            python3 -c "import yaml, sys; yaml.safe_load(open('$f'))" && echo "OK: $f"
          done
